<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    #chartContainer { position: relative; width: 100%; height: 520px; }
    #status { margin-top: 12px; color: #333; }
  </style>
</head>
<body>
  <h1>Températures horaires — Paris</h1>
  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>
  <div id="status">Chargement...</div>

  <script>
    async function drawChart() {
      try {
        const res = await fetch('/paris');
        const json = await res.json();
        
        const labels = [];
        const temps = [];
        
        for (let i = 0; i < Math.min(168, json.length); i++) {
          labels.push(i);
          temps.push(json[i].temperature_c);
        }

        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Température (°C)',
              data: temps,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.1)',
              borderWidth: 2,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              title: {
                display: true,
                text: 'Température à Paris (7 jours)'
              }
            },
            scales: {
              y: {
                title: {
                  display: true,
                  text: 'Température (°C)'
                }
              },
              x: {
                title: {
                  display: true,
                  text: 'Heures'
                }
              }
            }
          }
        });
        
        document.getElementById('status').textContent = 'OK - ' + json.length + ' points chargés';
      } catch (err) {
        document.getElementById('status').textContent = 'Erreur: ' + err.message;
        console.error(err);
      }
    }

    drawChart();
  </script>
</body>
</html>
