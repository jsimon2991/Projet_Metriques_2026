<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Mon Atelier — Humidité à Marseille</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    #chartContainer { position: relative; width: 500px; height: 500px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>Humidité Relative à Marseille — Camembert</h1>
  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <script>
    async function drawChart() {
      const res = await fetch('/marseille');
      const json = await res.json();
      
      // Regrouper par plages d'humidité
      const ranges = {
        '0-25%': 0,
        '25-50%': 0,
        '50-75%': 0,
        '75-100%': 0
      };

      json.forEach(p => {
        const h = p.humidity;
        if (h < 25) ranges['0-25%']++;
        else if (h < 50) ranges['25-50%']++;
        else if (h < 75) ranges['50-75%']++;
        else ranges['75-100%']++;
      });

      const ctx = document.getElementById('chart').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['0-25%', '25-50%', '50-75%', '75-100%'],
          datasets: [{
            data: [
              ranges['0-25%'],
              ranges['25-50%'],
              ranges['50-75%'],
              ranges['75-100%']
            ],
            backgroundColor: [
              '#FF6384',
              '#36A2EB',
              '#FFCE56',
              '#4BC0C0'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: 'Distribution de l\'humidité à Marseille (7 jours)'
            }
          }
        }
      });
    }

    drawChart();
  </script>
</body>
</html>
